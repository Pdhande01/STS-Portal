<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Smart Tech Service Portal - Professional computer repair services and hardware shop. Book certified technicians for home or shop repair services." />
    <meta name="keywords" content="computer repair, laptop repair, tech service, hardware shop, technician booking" />
    <meta name="author" content="Smart Tech Service Portal" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Smart Tech Service Portal" />
    <meta property="og:description" content="Professional computer repair services at your doorstep" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <title>Smart Tech Service Portal - Professional Computer Repair &amp; Hardware Shop</title>

    <style>
      /* ── Splash Screen ─────────────────────────────────────── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        animation: splashBg 3s ease infinite alternate;
      }

      @keyframes splashBg {
        0%   { background-position: 0% 50%; }
        100% { background-position: 100% 50%; }
      }

      /* Logo */
      .splash-logo {
        width: 260px;
        mix-blend-mode: screen;
        animation: logoIn 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards, logoGlow 2.5s ease-in-out 0.8s infinite alternate;
        filter: drop-shadow(0 0 0px rgba(96,165,250,0));
        background: transparent;
      }

      @keyframes logoIn {
        0%   { opacity: 0; transform: scale(0.6) translateY(20px); filter: drop-shadow(0 0 0px rgba(96,165,250,0)); }
        100% { opacity: 1; transform: scale(1)   translateY(0);    filter: drop-shadow(0 8px 24px rgba(96,165,250,0.5)); }
      }
      @keyframes logoGlow {
        0%   { filter: drop-shadow(0 6px 20px rgba(96,165,250,0.3)); }
        100% { filter: drop-shadow(0 8px 32px rgba(167,139,250,0.7)); }
      }

      /* Brand text */
      .splash-title {
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.04em;
        background: linear-gradient(90deg, #a78bfa, #60a5fa, #a78bfa);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 2s linear infinite;
      }
      .splash-sub {
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        font-size: 13px;
        color: #94a3b8;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-top: -20px;
      }

      @keyframes shimmer {
        to { background-position: 200% center; }
      }

      /* Dots */
      .splash-dots {
        display: flex;
        gap: 8px;
      }
      .splash-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #7c3aed;
        animation: bounce 1.2s ease-in-out infinite;
      }
      .splash-dots span:nth-child(2) { background: #6366f1; animation-delay: 0.2s; }
      .splash-dots span:nth-child(3) { background: #3b82f6; animation-delay: 0.4s; }

      @keyframes bounce {
        0%, 80%, 100% { transform: translateY(0);   opacity: 0.5; }
        40%            { transform: translateY(-10px); opacity: 1;   }
      }

      /* Progress bar */
      .splash-bar-wrap {
        width: 180px;
        height: 3px;
        background: rgba(255,255,255,0.1);
        border-radius: 99px;
        overflow: hidden;
      }
      .splash-bar {
        height: 100%;
        width: 0%;
        border-radius: 99px;
        background: linear-gradient(90deg, #7c3aed, #3b82f6);
        animation: loadBar 1.8s ease-out forwards;
      }
      @keyframes loadBar {
        0%   { width: 0%; }
        60%  { width: 75%; }
        100% { width: 100%; }
      }

      /* Fade-out transition */
      #splash.fade-out {
        opacity: 0;
        transition: opacity 0.5s ease;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <!-- Splash screen (visible before React mounts) -->
    <div id="splash">
      <img class="splash-logo" src="/logo.png" alt="Smart Tech Service Portal" />
      <div class="splash-dots">
        <span></span><span></span><span></span>
      </div>
      <div class="splash-bar-wrap">
        <div class="splash-bar"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>

    <script>
      // Remove splash once React has painted the first frame
      (function () {
        var splash = document.getElementById('splash');
        function removeSplash() {
          if (!splash) return;
          splash.classList.add('fade-out');
          setTimeout(function () { splash && splash.remove(); }, 520);
        }
        // Fallback: always remove after 3.5 s even if app stalls
        var fallback = setTimeout(removeSplash, 3500);
        document.addEventListener('DOMContentLoaded', function () {
          // Watch for React to mount content into #root
          var observer = new MutationObserver(function () {
            var root = document.getElementById('root');
            if (root && root.children.length > 0) {
              observer.disconnect();
              clearTimeout(fallback);
              // Small delay so first render paints smoothly
              setTimeout(removeSplash, 300);
            }
          });
          observer.observe(document.getElementById('root'), { childList: true });
        });
      })();
    </script>
  </body>
</html>
